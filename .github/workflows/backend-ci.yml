name: Backend CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Presentation/API.csproj

      - name: Install EF Core CLI Tool
        run: dotnet tool install --global dotnet-ef

      - name: Build
        run: |
          cd src/Presentation
          dotnet build API.csproj --no-restore -c Release

      - name: Apply Database Migrations
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project src/Infrastructure/Infrastructure.csproj \
            --startup-project src/Presentation/API.csproj \
            --connection "${{ secrets.DB_ADMIN_CONNECTION_STRING }}"
